<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 200px;
  background: #1e293b;
  color: white;
  padding: 10px;
}

.sidebar div {
  padding: 10px;
  cursor: pointer;
  border-radius: 6px;
}

.sidebar div:hover {
  background: #334155;
}

.content {
  flex: 1;
  padding: 20px;
}

.link {
  display: block;
  padding: 8px;
  text-decoration: none;
  color: #333;
  border-radius: 6px;
}

.link:hover {
  background: #f1f5f9;
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar"></div>
<div class="content" id="content"></div>

<script>
const data = homeLinks;

const sidebar = document.getElementById('sidebar');
const content = document.getElementById('content');

function renderLinks(category) {
  content.innerHTML = '';
  category.links.forEach(link => {
    const a = document.createElement('a');
    a.href = link.url;
    a.textContent = link.text;
    a.className = 'link';
    a.target = '_blank';
    content.appendChild(a);
  });
}

data.forEach(cat => {
  const div = document.createElement('div');
  div.textContent = cat.categoryTitle;
  div.onclick = () => renderLinks(cat);
  sidebar.appendChild(div);
});

// default
renderLinks(data[0]);
</script>

</body>
</html>
